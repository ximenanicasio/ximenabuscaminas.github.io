<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscaminas Pro 💣</title>
    <style>
        :root {
    --morado-base: #2a0a4a;
    --morado-secundario: #1a0833;
    --morado-glow: #a855f7;
    --texto-blanco: #ffffff;
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
    background: radial-gradient(circle at top, #2a0a4a, #0d0d1a);
    color: var(--texto-blanco);
}

       .contenedor {
            background: linear-gradient(145deg, var(--panel), #241640);
            padding: 28px;
            border-radius: 20px;
            box-shadow: var(--glow) rgba(255, 106, 193, 0.2), 0 25px 60px rgba(0,0,0,0.6);
            max-width: 95vw;
            border: 1px solid rgba(255, 106, 193, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 18px;
            font-size: 2.2rem;
            background: linear-gradient(90deg, var(--morado), var(--celda-hover), var(--azul));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 106, 193, 0.6));
            font-weight: 900;
            letter-spacing: 1px;
        }

       .panel-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

       .contadores {
            display: flex;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            flex-wrap: wrap;
        }

       .contador {
            background: rgba(15, 10, 36, 0.8);
            padding: 10px 14px;
            border-radius: 10px;
            min-width: 75px;
            text-align: center;
            border: 1px solid rgba(255, 106, 193, 0.2);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }

        #minas { color: var(--rojo); text-shadow: 0 0 10px var(--rojo); }
        #tiempo { color: var(--azul); text-shadow: 0 0 10px var(--azul); }
        #intentos { color: var(--amarillo); text-shadow: 0 0 10px var(--amarillo); }

       .btn {
            background: linear-gradient(135deg, var(--morado), var(--celda-hover));
            color: white;
            border: none;
            padding: 11px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 15px rgba(255, 106, 193, 0.3);
        }

       .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 106, 193, 0.5);
            filter: brightness(1.15);
        }

       .btn:active {
            transform: translateY(0) scale(0.98);
        }

        #btnCara {
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--amarillo), #ff9f40);
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 210, 63, 0.4);
        }

        select {
            background: rgba(15, 10, 36, 0.8);
            color: var(--texto);
            border: 2px solid var(--morado);
            padding: 9px 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:hover, select:focus {
            border-color: var(--celda-hover);
            box-shadow: 0 0 15px rgba(255, 106, 193, 0.3);
            outline: none;
        }

        #tablero {
            display: grid;
            gap: 3px;
            background: var(--borde);
            padding: 4px;
            border-radius: 10px;
            margin: 0 auto;
            box-shadow: var(--glow) rgba(255, 106, 193, 0.4);
        }

       .celda {
            background: linear-gradient(145deg, var(--celda), #221340);
            border: 2px solid rgba(255, 106, 193, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
            aspect-ratio: 1;
            line-height: 1;
            border-radius: 4px;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.4);
        }

       .celda:hover:not(.abierta) {
            background: var(--celda-hover);
            border-color: var(--celda-hover);
            box-shadow: 0 0 12px var(--celda-hover), inset 0 0 8px rgba(255,255,255,0.2);
            transform: scale(1.08);
            z-index: 5;
        }

       .celda.abierta {
            background: var(--abierta);
            border: 1px solid rgba(255, 106, 193, 0.3);
            cursor: default;
            animation: revelar 0.2s ease;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
        }

       .celda.bandera::after {
            content: "🚩";
            animation: pop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 0 5px rgba(255, 61, 90, 0.6));
        }

       .celda.duda::after {
            content: "❓";
            color: var(--amarillo);
            animation: pop 0.3s;
            text-shadow: 0 0 8px var(--amarillo);
        }

       .celda.mina {
            background: var(--rojo);
            animation: explotar 0.6s ease;
            font-size: 1.3em;
            box-shadow: 0 0 20px var(--rojo), inset 0 0 10px rgba(0,0,0,0.5);
        }

       .celda.mina-ganadora {
            background: var(--verde);
            animation: ganar 0.6s ease;
            box-shadow: 0 0 20px var(--verde);
        }

       .n1 { color: #5a9cff; text-shadow: 0 0 8px #5a9cff; }
       .n2 { color: #00ffa3; text-shadow: 0 0 8px #00ffa3; }
       .n3 { color: #ff3d5a; text-shadow: 0 0 8px #ff3d5a; }
       .n4 { color: #a855f7; text-shadow: 0 0 8px #a855f7; }
       .n5 { color: #ffd23f; text-shadow: 0 0 8px #ffd23f; }
       .n6 { color: #00f7ff; text-shadow: 0 0 8px #00f7ff; }
       .n7 { color: #fef3ff; text-shadow: 0 0 8px #fef3ff; }
       .n8 { color: #9ca3af; }

        #mensaje {
            text-align: center;
            margin-top: 14px;
            font-weight: bold;
            min-height: 24px;
            font-size: 1.1rem;
            color: var(--morado);
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

       .facil.celda { width: 35px; font-size: 16px; }
       .medio.celda { width: 28px; font-size: 14px; }
       .dificil.celda { width: 22px; font-size: 12px; }
       .experto.celda { width: 20px; font-size: 11px; }

        @keyframes revelar {
            0% { transform: scale(1.3) rotateX(90deg); opacity: 0; }
            100% { transform: scale(1) rotateX(0); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(0) rotate(-180deg); }
            70% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0); }
        }

        @keyframes explotar {
            0% { transform: scale(1); }
            15% { transform: scale(1.6) rotate(15deg); filter: brightness(2); }
            30% { transform: scale(0.6) rotate(-15deg); }
            45% { transform: scale(1.5) rotate(10deg); filter: brightness(1.5); }
            60% { transform: scale(0.8) rotate(-10deg); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        @keyframes ganar {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 30px var(--verde); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-12px) translateY(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(12px) translateY(5px); }
        }

       .shake { animation: shake 0.8s ease; }

       .musica-panel {
            position: fixed;
            bottom: 12px;
            right: 12px;
            background: linear-gradient(145deg, var(--panel), #241640);
            padding: 12px 16px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 15px rgba(255, 106, 193, 0.2);
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 106, 193, 0.3);
        }

       .musica-panel audio {
            width: 165px;
            height: 34px;
            filter: hue-rotate(280deg) saturate(1.5);
        }

       .musica-panel span {
            font-size: 12px;
            opacity: 0.9;
            color: var(--celda-hover);
        }

        /* MODAL DE BOOM */
        #modalBoom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 26, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(8px);
        }

        #modalBoom.mostrar {
            display: flex;
        }

       .modal-contenido {
            background: linear-gradient(145deg, var(--panel), #241640);
            padding: 45px 55px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 70px rgba(255, 61, 90, 0.6), var(--glow) rgba(255, 61, 90, 0.3);
            border: 2px solid var(--rojo);
            animation: boomIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

       .modal-contenido h2 {
            font-size: 3.2rem;
            color: var(--rojo);
            margin-bottom: 12px;
            text-shadow: 0 0 25px var(--rojo), 0 0 40px var(--rojo);
            font-weight: 900;
        }

       .modal-contenido p {
            font-size: 1.3rem;
            margin-bottom: 28px;
            color: var(--texto);
            opacity: 0.9;
        }

       .modal-contenido.btn {
            font-size: 1.2rem;
            padding: 15px 32px;
            background: linear-gradient(135deg, var(--rojo), #ff1744);
            box-shadow: 0 0 20px rgba(255, 61, 90, 0.5);
        }

       .modal-contenido.btn:hover {
            background: linear-gradient(135deg, #ff1744, var(--rojo));
            box-shadow: 0 0 30px rgba(255, 61, 90, 0.7);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes boomIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        #avisoAudio {
            position: fixed;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--morado), var(--celda-hover));
            color: white;
            padding: 13px 22px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 1000;
            animation: pop 0.4s ease;
            box-shadow: 0 0 25px rgba(255, 106, 193, 0.5);
        }

        @media (max-width: 600px) {
           .panel-control { justify-content: center; }
           .dificil.celda,.experto.celda { width: 18px; font-size: 10px; }
           .musica-panel { bottom: 6px; right: 6px; padding: 8px; }
           .musica-panel audio { width: 125px; }
           .contadores { font-size: 0.95rem; gap: 9px; }
           .modal-contenido { padding: 32px 28px; }
           .modal-contenido h2 { font-size: 2.2rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div id="avisoAudio">🔊 Haz click en cualquier celda para activar el audio</div>

    <!-- MODAL BOOM -->
    <div id="modalBoom">
        <div class="modal-contenido">
            <h2>💥 ¡BOOM! 💥</h2>
            <p>¡PERDISTE! Tocaste una bomba</p>
            <button class="btn" onclick="cerrarModalYReiniciar()">Volver a jugar</button>
        </div>
    </div>

    <div class="contenedor">
        <h1>Buscaminas Pro 💣</h1>

        <div class="panel-control">
            <select id="dificultad">
                <option value="facil">Fácil 9x9 - 10 minas</option>
                <option value="medio" selected>Medio 16x16 - 40 minas</option>
                <option value="dificil">Difícil 16x30 - 99 minas</option>
                <option value="experto">Experto 20x20 - 80 minas</option>
            </select>

            <button class="btn" id="btnCara">😊</button>

            <div class="contadores">
                <div class="contador">💣 <span id="minas">40</span></div>
                <div class="contador">⏱️ <span id="tiempo">000</span></div>
                <div class="contador">🎯 <span id="intentos">0</span></div>
            </div>
        </div>

        <div id="tablero" class="medio"></div>
        <div id="mensaje">Click para empezar</div>
    </div>

    <div class="musica-panel">
        <span>🎵 Música:</span>
        <audio id="musicaFondo" controls loop>
            <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const CONFIG = {
            facil: { filas: 9, cols: 9, minas: 10 },
            medio: { filas: 16, cols: 16, minas: 40 },
            dificil: { filas: 16, cols: 30, minas: 99 },
            experto: { filas: 20, cols: 20, minas: 80 }
        };

        let tablero = [];
        let filas, cols, totalMinas;
        let minasRestantes, celdasAbiertas, primerClick;
        let juegoActivo, tiempo, timer;
        let dificultadActual = 'medio';
        let audioDesbloqueado = false;
        let intentosTotales = 0;

        const tableroDiv = document.getElementById('tablero');
        const minasSpan = document.getElementById('minas');
        const tiempoSpan = document.getElementById('tiempo');
        const intentosSpan = document.getElementById('intentos');
        const mensaje = document.getElementById('mensaje');
        const btnCara = document.getElementById('btnCara');
        const selectDificultad = document.getElementById('dificultad');
        const musicaFondo = document.getElementById('musicaFondo');
        const avisoAudio = document.getElementById('avisoAudio');
        const modalBoom = document.getElementById('modalBoom');

        let audioCtx;

        // SONIDOS DE EXPLOSIÓN TRIPLES
        const explosion1 = new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_8b4f0e4b7a.mp3');
        const explosion2 = new Audio('https://cdn.pixabay.com/download/audio/2022/03/24/audio_d1718ab41c.mp3');
        const explosion3 = new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3');
        explosion1.volume = 1.0;
        explosion2.volume = 1.0;
        explosion3.volume = 1.0;

        function desbloquearAudio() {
            if (!audioDesbloqueado) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.resume();
                audioDesbloqueado = true;
                avisoAudio.style.display = 'none';
                explosion1.load();
                explosion2.load();
                explosion3.load();
            }
        }

        function reproducirExplosion() {
            if (!audioDesbloqueado) return;

            explosion1.currentTime = 0;
            explosion2.currentTime = 0;
            explosion3.currentTime = 0;

            explosion1.play().catch(() => {});
            setTimeout(() => explosion2.play().catch(() => {}), 30);
            setTimeout(() => explosion3.play().catch(() => {}), 60);

            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);

            osc1.frequency.value = 40;
            osc2.frequency.value = 80;
            gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);

            osc1.start();
            osc2.start();
            osc1.stop(audioCtx.currentTime + 1.2);
            osc2.stop(audioCtx.currentTime + 1.2);

            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 800);
        }

        function sonido(tipo) {
            if (!audioDesbloqueado) return;

            if (tipo === 'mina') {
                reproducirExplosion();
                return;
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (tipo === 'click') {
                osc.frequency.value = 600;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            } else if (tipo === 'bandera') {
                osc.frequency.value = 800;
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            } else if (tipo === 'ganar') {
                [523, 659, 784, 1047].forEach((freq, i) => {
                    setTimeout(() => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.frequency.value = freq;
                        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                        o.start(); o.stop(audioCtx.currentTime + 0.3);
                    }, i * 150);
                });
                return;
            }
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        btnCara.onclick = () => {
            desbloquearAudio();
            iniciarJuego();
        };

        selectDificultad.onchange = () => {
            dificultadActual = selectDificultad.value;
            iniciarJuego();
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('click', desbloquearAudio, { once: true });

        musicaFondo.volume = 0.2;

        function cerrarModalYReiniciar() {
            modalBoom.classList.remove('mostrar');
            iniciarJuego();
        }

        function iniciarJuego() {
            const cfg = CONFIG[dificultadActual];
            filas = cfg.filas;
            cols = cfg.cols;
            totalMinas = cfg.minas;

            tablero = [];
            minasRestantes = totalMinas;
            celdasAbiertas = 0;
            primerClick = true;
            juegoActivo = true;
            tiempo = 0;

            clearInterval(timer);
            btnCara.textContent = '😊';
            mensaje.textContent = 'Click para empezar';
            actualizarContadores();

            tableroDiv.className = dificultadActual;
            tableroDiv.innerHTML = '';
            tableroDiv.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            for (let i = 0; i < filas; i++) {
                tablero[i] = [];
                for (let j = 0; j < cols; j++) {
                    const celda = document.createElement('div');
                    celda.className = 'celda';
                    celda.dataset.fila = i;
                    celda.dataset.col = j;
                    celda.onclick = () => clickCelda(i, j);
                    celda.oncontextmenu = (e) => {
                        e.preventDefault();
                        clickDerecho(i, j);
                    };
                    celda.onmousedown = () => { if (juegoActivo) btnCara.textContent = '😮'; };
                    celda.onmouseup = () => { if (juegoActivo) btnCara.textContent = '😊'; };
                    tableroDiv.appendChild(celda);

                    tablero[i][j] = {
                        mina: false,
                        abierta: false,
                        bandera: false,
                        duda: false,
                        minasCerca: 0,
                        elem: celda
                    };
                }
            }
        }

        function colocarMinas(f, c) {
            let minasPuestas = 0;
            while (minasPuestas < totalMinas) {
                const rf = Math.floor(Math.random() * filas);
                const rc = Math.floor(Math.random() * cols);
                if (!tablero[rf][rc].mina && (Math.abs(rf - f) > 1 || Math.abs(rc - c) > 1)) {
                    tablero[rf][rc].mina = true;
                    minasPuestas++;
                }
            }

            for (let i = 0; i < filas; i++) {
                for (let j = 0; j < cols; j++) {
                    if (!tablero[i][j].mina) {
                        tablero[i][j].minasCerca = contarVecinos(i, j);
                    }
                }
            }
        }

        function contarVecinos(f, c) {
            let total = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    const nf = f + i, nc = c + j;
                    if (nf >= 0 && nf < filas && nc >= 0 && nc < cols) {
                        if (tablero[nf][nc].mina) total++;
                    }
                }
            }
            return total;
        }

        function clickCelda(f, c) {
            if (!juegoActivo || tablero[f][c].abierta || tablero[f][c].bandera) return;

            if (primerClick) {
                desbloquearAudio();
                colocarMinas(f, c);
                primerClick = false;
                iniciarTimer();
                mensaje.textContent = '¡Suerte!';
                if (musicaFondo.paused) musicaFondo.play().catch(() => {});
            }

            abrirCelda(f, c);
        }

        function abrirCelda(f, c) {
            const celda = tablero[f][c];
            if (celda.abierta || celda.bandera) return;

            celda.abierta = true;
            celda.elem.classList.add('abierta');
            celdasAbiertas++;

            if (celda.mina) {
                perderJuego(f, c);
                return;
            }

            sonido('click');

            if (celda.minasCerca > 0) {
                celda.elem.textContent = celda.minasCerca;
                celda.elem.classList.add(`n${celda.minasCerca}`);
            } else {
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const nf = f + i, nc = c + j;
                        if (nf >= 0 && nf < filas && nc >= 0 && nc < cols) {
                            abrirCelda(nf, nc);
                        }
                    }
                }
            }

            verificarVictoria();
        }

        function clickDerecho(f, c) {
            if (!juegoActivo || tablero[f][c].abierta) return;
            if (primerClick) return;

            const celda = tablero[f][c];
            sonido('bandera');

            if (!celda.bandera &&!celda.duda) {
                celda.bandera = true;
                celda.elem.classList.add('bandera');
                minasRestantes--;
            } else if (celda.bandera) {
                celda.bandera = false;
                celda.duda = true;
                celda.elem.classList.remove('bandera');
                celda.elem.classList.add('duda');
                minasRestantes++;
            } else {
                celda.duda = false;
                celda.elem.classList.remove('duda');
            }

            actualizarContadores();
        }

        function perderJuego(f, c) {
            juegoActivo = false;
            clearInterval(timer);
            sonido('mina');
            btnCara.textContent = '😵';
            intentosTotales++;
            actualizarContadores();

            // Mostrar todas las minas
            for (let i = 0; i < filas; i++) {
                for (let j = 0; j < cols; j++) {
                    if (tablero[i][j].mina) {
                        tablero[i][j].elem.classList.add('abierta');
                        if (i === f && j === c) {
                            tablero[i][j].elem.classList.add('mina');
                            tablero[i][j].elem.textContent = '💥';
                        } else {
                            tablero[i][j].elem.textContent = '💣';
                        }
                    } else if (tablero[i][j].bandera) {
                        tablero[i][j].elem.textContent = '❌';
                    }
                }
            }

            // Mostrar modal de BOOM después de la animación
            setTimeout(() => {
                modalBoom.classList.add('mostrar');
            }, 800);
        }

        function verificarVictoria() {
            if (celdasAbiertas === filas * cols - totalMinas) {
                juegoActivo = false;
                clearInterval(timer);
                sonido('ganar');
                btnCara.textContent = '😎';
                mensaje.textContent = `¡Ganaste en ${tiempo}s!`;
                intentosTotales++;
                actualizarContadores();

                for (let i = 0; i < filas; i++) {
                    for (let j = 0; j < cols; j++) {
                        if (tablero[i][j].mina &&!tablero[i][j].bandera) {
                            tablero[i][j].elem.classList.add('mina-ganadora');
                            tablero[i][j].elem.textContent = '🚩';
                        }
                    }
                }
            }
        }

        function iniciarTimer() {
            timer = setInterval(() => {
                tiempo++;
                tiempoSpan.textContent = tiempo.toString().padStart(3, '0');
                if (tiempo >= 999) clearInterval(timer);
            }, 1000);
        }

        function actualizarContadores() {
            minasSpan.textContent = minasRestantes;
            intentosSpan.textContent = intentosTotales;
        }

        iniciarJuego();
    </script>
</body>
</html>
